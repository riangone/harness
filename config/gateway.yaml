# Harness 2.0 - 邮件解析配置
# 
# 注意：harness 不负责 SMTP/IMAP 收发邮件
# 邮件收发由 MailMindHub 负责，harness 只解析邮件内容 → 任务

mail:
  # 路由规则：匹配邮件内容并转换为任务
  # 规则按优先级排列：显式命令 > 自然语言关键词 > 通用兜底
  routing_rules:

    # ── 显式命令（后向兼容） ──────────────────────────────────
    # 代码审查
    - pattern: "^(review|/review)\\s+(.+)"
      action: create_task
      pipeline: code_review
      task_type: code_review

    # 代码生成
    - pattern: "^(generate|/generate|/gen|/g)\\s+(.+)"
      action: create_task
      pipeline: code_generation
      task_type: code_generation

    # Bug修复
    - pattern: "^(fix|/fix)\\s+(.+)"
      action: create_task
      pipeline: bug_fix
      task_type: bug_fix

    # 帮助
    - pattern: "^(help|/help|\\?)"
      action: reply_help

    # ── 自然语言：代码相关 ────────────────────────────────────
    - pattern: "(?i)(코드|程序|函数|クラス|関数|実装|プログラム|コード|スクリプト|write.*code|implement|script|function|class|module|api|バグ|bug|エラー|error|修正|修复|直して)"
      action: create_task
      pipeline: code_generation
      task_type: code_generation

    # ── 自然语言：調査・リサーチ ──────────────────────────────
    - pattern: "(?i)(調査|リサーチ|調べ|レポート|報告書|まとめて|情報収集|report|research|investigate|look.?up|find.?out|调查|研究|搜索|汇报|报告|整理.*情報|ニュース|トレンド)"
      action: create_task
      pipeline: research
      task_type: research

    # ── 自然语言：ドキュメント・資料（執筆より先に評価） ────────
    # 「仕様書を書いて」のように「書いて」を含む表現でも正しく document にマッチさせる
    - pattern: "(?i)(PPT|PowerPoint|スライド|プレゼン|発表資料|PDF|Word|Excel|スプレッドシート|資料作成|議事録|マニュアル|仕様書|ドキュメント作成|presentation|slides|spreadsheet|幻灯片|演示|文档)"
      action: create_task
      pipeline: document
      task_type: document

    # ── 自然语言：文章・執筆 ──────────────────────────────────
    - pattern: "(?i)(小説|文章|ブログ|記事|エッセイ|手紙|作文|書いて|執筆|コピーライト|メール文|SNS|ツイート|キャッチコピー|write.*story|compose|draft|essay|blog|novel|story|poem|写作|小说|博客|文案)"
      action: create_task
      pipeline: writing
      task_type: writing

    # ── 自然语言：ファイル・フォルダ操作 ─────────────────────
    - pattern: "(?i)(フォルダ.*整理|ファイル.*整理|ディレクトリ|リネーム|一括.*変換|organize.*file|file.*organiz|rename|batch.*convert|文件整理|目录整理)"
      action: create_task
      pipeline: file_ops
      task_type: file_ops

    # ── 汎用フォールバック（すべての自然言語を受け付ける） ─────
    - pattern: ".+"
      action: create_task
      pipeline: default
      task_type: general

  # 任务完成响应邮件模板（供 MailMindHub 使用）
  response_template: |
    ✅ **任务完成**

    **任务**: {{ task_summary }}
    **耗时**: {{ duration }}秒
    **状态**: {{ status }}

    **执行步骤**:
    {{ result_summary }}
    ---
    💡 回复此邮件可继续对话
