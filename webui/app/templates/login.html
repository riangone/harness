<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Multi-AI Harness</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div style="display:flex;justify-content:center;align-items:center;min-height:100vh;">
    <div style="background:var(--color-bg-secondary);border:1px solid var(--color-border);border-radius:8px;padding:2rem;width:100%;max-width:400px;box-shadow:0 2px 8px rgba(0,0,0,0.4);">
        <h2 style="margin-bottom:1.5rem;font-size:1.3rem;text-align:center;">Login</h2>
        {% if error %}
        <div style="background:var(--color-danger);color:#fff;padding:0.75rem;border-radius:6px;margin-bottom:1rem;font-size:0.85rem;text-align:center;">
            Invalid username or password.
        </div>
        {% endif %}
        <form method="post" action="/login" accept-charset="UTF-8">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
        </form>
    </div>
</div>
</body>
</html>
