{% extends "base.html" %}

{% block title %}{{ t('tasks') }} - Multi-AI Harness{% endblock %}

{% block content %}
<!-- Edit Task Modal -->
<div id="task-modal" class="modal-overlay" onclick="if(event.target===this)closeTaskModal()">
    <div class="modal-box">
        <div class="modal-header">
            <h3>{{ t('edit_task') }}</h3>
            <button onclick="closeTaskModal()" class="modal-close-btn" aria-label="Close">✕</button>
        </div>
        <div id="task-modal-body" style="padding:1.5rem;">
            <!-- HTMX will load content here -->
        </div>
    </div>
</div>

<div class="page-header">
    <h2>{{ t('tasks') }}</h2>
</div>

<!-- Add Task Form -->
<details class="mb-2">
    <summary>{{ t('add_task') }}</summary>
    <div class="details-content">
        <form hx-post="/tasks" hx-target="#tasks-tbody" hx-swap="innerHTML" accept-charset="UTF-8">
            <div class="form-group">
                <label for="title">{{ t('title') }}</label>
                <input type="text" id="title" name="title" required placeholder="e.g. Implement login feature">
            </div>
            <div class="form-group">
                <label for="prompt">{{ t('prompt') }}</label>
                <textarea id="prompt" name="prompt" required placeholder="Instructions for the AI agent..."></textarea>
            </div>
            <div class="form-group">
                <label for="success_criteria">{{ t('success_criteria') }}</label>
                <textarea id="success_criteria" name="success_criteria" rows="2" placeholder="{{ t('success_criteria_desc') }}"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="project_id">{{ t('project_optional') }}</label>
                    <select id="project_id" name="project_id">
                        <option value="">{{ t('no_project') }}</option>
                        {% for project in projects %}
                        <option value="{{ project.id }}">{{ project.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="agent_id">{{ t('agent_optional') }}</label>
                    <select id="agent_id" name="agent_id">
                        <option value="">{{ t('auto_select') }}</option>
                        {% for agent in agents %}
                        <option value="{{ agent.id }}">{{ agent.name }} ({{ agent.cli_command }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="depends_on_id">{{ t('depends_on') }}</label>
                    <select id="depends_on_id" name="depends_on_id">
                        <option value="">{{ t('no_dependency') }}</option>
                        {% for t in all_tasks %}
                        <option value="{{ t.id }}">{{ t.title }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="parallel_group">{{ t('parallel_group') }}</label>
                    <input type="text" id="parallel_group" name="parallel_group" placeholder="e.g. group-a">
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" name="pipeline_mode"> {{ t('pipeline_mode_desc') }}
                    </label>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">{{ t('add') }} {{ t('task') }}</button>
        </form>
    </div>
</details>

<!-- Tasks List -->
<div class="table-wrapper">
    <table>
        <thead>
            <tr>
                <th>{{ t('title') }}</th>
                <th>{{ t('project') }}</th>
                <th>{{ t('agent') }}</th>
                <th>{{ t('status') }}</th>
                <th>{{ t('created') }}</th>
                <th>{{ t('actions') }}</th>
            </tr>
        </thead>
        <tbody id="tasks-tbody"
               hx-get="/tasks/list"
               hx-trigger="load, reloadTaskList from:body"
               hx-swap="innerHTML">
        </tbody>
    </table>
</div>

<script>
function openTaskModal() {
    const modal = document.getElementById('task-modal');
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
}
function closeTaskModal() {
    const modal = document.getElementById('task-modal');
    modal.classList.remove('active');
    document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeTaskModal();
});
</script>
{% endblock %}
