<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 520px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-area {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.2s;
      outline: none;
    }

    .input-area input:focus {
      border-color: #667eea;
    }

    .input-area button {
      padding: 12px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .input-area button:hover {
      opacity: 0.9;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      flex: 1;
      padding: 8px;
      border: 2px solid #e0e0e0;
      background: #fff;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      color: #555;
    }

    .filters button.active {
      border-color: #667eea;
      background: #667eea;
      color: #fff;
    }

    .filters button:hover:not(.active) {
      border-color: #667eea;
      color: #667eea;
    }

    .todo-list {
      list-style: none;
      margin-bottom: 16px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid #f0f0f0;
      gap: 12px;
      transition: background-color 0.2s;
    }

    .todo-item:hover {
      background-color: #f9f9f9;
    }

    .todo-item:last-child {
      border-bottom: none;
    }

    /* ドラッグ中のスタイル */
    .todo-item.dragging {
      opacity: 0.4;
      background-color: #f0f0f0;
    }

    /* ドラッグオーバー時の挿入ガイドライン */
    .todo-item.drag-over-top {
      border-top: 3px solid #667eea;
    }

    .todo-item.drag-over-bottom {
      border-bottom: 3px solid #667eea;
    }

    /* ドラッグハンドル */
    .drag-handle {
      cursor: grab;
      color: #ccc;
      font-size: 16px;
      user-select: none;
      flex-shrink: 0;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .todo-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #667eea;
    }

    .todo-item .todo-text {
      flex: 1;
      font-size: 16px;
      color: #333;
      word-break: break-word;
    }

    .todo-item .todo-text.completed {
      text-decoration: line-through;
      color: #aaa;
    }

    /* インライン編集中のinput */
    .todo-item .edit-input {
      flex: 1;
      padding: 6px 10px;
      border: 2px solid #667eea;
      border-radius: 6px;
      font-size: 16px;
      outline: none;
    }

    .todo-item .delete-btn {
      padding: 6px 12px;
      background: #ff4757;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background-color 0.2s;
      opacity: 0.7;
    }

    .todo-item .delete-btn:hover {
      background-color: #ff3344;
      opacity: 1;
    }

    .empty-message {
      text-align: center;
      color: #999;
      padding: 24px;
      font-size: 14px;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid #f0f0f0;
      font-size: 14px;
      color: #666;
    }

    .footer .count {
      font-weight: 600;
      color: #667eea;
    }

    /* 全選択チェックボックス */
    .select-all-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 0 12px;
    }

    .select-all-row.hidden {
      display: none;
    }

    .select-all-row label {
      font-size: 14px;
      color: #666;
      cursor: pointer;
      user-select: none;
    }

    .select-all-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #667eea;
    }

    /* 完了クリアボタン */
    .clear-completed-btn {
      padding: 6px 14px;
      background: #fff;
      color: #667eea;
      border: 2px solid #667eea;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-completed-btn:hover {
      background: #667eea;
      color: #fff;
    }

    .clear-completed-btn.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Todo App</h1>

    <div class="input-area">
      <input type="text" id="todo-input" placeholder="新しいTodoを入力..." autofocus>
      <button id="add-btn">追加</button>
    </div>

    <div class="filters">
      <button data-filter="all" class="active">全て</button>
      <button data-filter="active">未完了</button>
      <button data-filter="completed">完了済み</button>
    </div>

    <!-- 全選択チェックボックス -->
    <div class="select-all-row hidden" id="select-all-row">
      <input type="checkbox" id="select-all-checkbox">
      <label for="select-all-checkbox">全選択</label>
    </div>

    <ul id="todo-list" class="todo-list"></ul>

    <div class="footer">
      <span>未完了: <span class="count" id="pending-count">0</span> 件</span>
      <button class="clear-completed-btn hidden" id="clear-completed-btn">完了をクリア</button>
    </div>
  </div>

  <script>
    (function() {
      const STORAGE_KEY = 'todo-app-todos';
      let todos = [];
      let currentFilter = 'all';

      // ドラッグ＆ドロップ状態
      let draggedId = null;

      // DOM elements
      const todoInput = document.getElementById('todo-input');
      const addBtn = document.getElementById('add-btn');
      const todoList = document.getElementById('todo-list');
      const pendingCount = document.getElementById('pending-count');
      const filterButtons = document.querySelectorAll('.filters button');
      const selectAllRow = document.getElementById('select-all-row');
      const selectAllCheckbox = document.getElementById('select-all-checkbox');
      const clearCompletedBtn = document.getElementById('clear-completed-btn');

      // Load todos from LocalStorage
      function loadTodos() {
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          if (stored) {
            todos = JSON.parse(stored);
          }
        } catch (e) {
          todos = [];
        }
      }

      // Save todos to LocalStorage
      function saveTodos() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
        } catch (e) {
          // Storage full or disabled
        }
      }

      // Render the todo list
      function render() {
        const filteredTodos = todos.filter(function(todo) {
          if (currentFilter === 'active') return !todo.completed;
          if (currentFilter === 'completed') return todo.completed;
          return true;
        });

        todoList.innerHTML = '';

        if (filteredTodos.length === 0) {
          const emptyMsg = document.createElement('div');
          emptyMsg.className = 'empty-message';
          if (currentFilter === 'all') {
            emptyMsg.textContent = 'Todoがありません。追加してください！';
          } else if (currentFilter === 'active') {
            emptyMsg.textContent = '未完了のTodoはありません！';
          } else {
            emptyMsg.textContent = '完了済みのTodoはありません！';
          }
          todoList.appendChild(emptyMsg);
        } else {
          filteredTodos.forEach(function(todo, index) {
            const li = document.createElement('li');
            li.className = 'todo-item';
            li.dataset.id = todo.id;

            // ドラッグハンドル（allフィルター時のみ表示）
            if (currentFilter === 'all') {
              const dragHandle = document.createElement('span');
              dragHandle.className = 'drag-handle';
              dragHandle.textContent = '\u2630';
              dragHandle.draggable = true;
              dragHandle.title = 'ドラッグで並び替え';
              li.appendChild(dragHandle);

              // Drag & Drop イベント
              dragHandle.addEventListener('dragstart', handleDragStart);
              li.addEventListener('dragover', handleDragOver);
              li.addEventListener('dragleave', handleDragLeave);
              li.addEventListener('drop', handleDrop);
            }

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.checked = todo.completed;
            checkbox.addEventListener('change', function() {
              toggleTodo(todo.id);
            });

            const span = document.createElement('span');
            span.className = 'todo-text' + (todo.completed ? ' completed' : '');
            span.textContent = todo.text;

            // ダブルクリックでインライン編集（allフィルター時のみ）
            if (currentFilter === 'all') {
              span.addEventListener('dblclick', function() {
                startInlineEdit(li, todo.id, span, todo.text);
              });
            }

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn';
            deleteBtn.textContent = '削除';
            deleteBtn.addEventListener('click', function() {
              deleteTodo(todo.id);
            });

            li.appendChild(checkbox);
            li.appendChild(span);
            li.appendChild(deleteBtn);
            todoList.appendChild(li);
          });
        }

        // Update pending count
        const pending = todos.filter(function(t) { return !t.completed; }).length;
        pendingCount.textContent = pending;

        // 全選択行の表示制御
        updateSelectAllUI();

        // 完了クリアボタンの表示制御
        updateClearCompletedBtn();
      }

      // 全選択UIの更新
      function updateSelectAllUI() {
        if (todos.length === 0) {
          selectAllRow.classList.add('hidden');
          return;
        }
        selectAllRow.classList.remove('hidden');
        const allCompleted = todos.every(function(t) { return t.completed; });
        selectAllCheckbox.checked = allCompleted;
      }

      // 完了クリアボタンの表示制御
      function updateClearCompletedBtn() {
        const completedCount = todos.filter(function(t) { return t.completed; }).length;
        if (completedCount > 0) {
          clearCompletedBtn.classList.remove('hidden');
        } else {
          clearCompletedBtn.classList.add('hidden');
        }
      }

      // Add a new todo
      function addTodo() {
        const text = todoInput.value.trim();
        if (!text) return;

        todos.push({
          id: Date.now(),
          text: text,
          completed: false
        });

        todoInput.value = '';
        saveTodos();
        render();
        todoInput.focus();
      }

      // Toggle todo completion
      function toggleTodo(id) {
        todos = todos.map(function(todo) {
          if (todo.id === id) {
            return { ...todo, completed: !todo.completed };
          }
          return todo;
        });
        saveTodos();
        render();
      }

      // Delete a todo
      function deleteTodo(id) {
        todos = todos.filter(function(todo) { return todo.id !== id; });
        saveTodos();
        render();
      }

      // インライン編集
      function startInlineEdit(li, id, span, originalText) {
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'edit-input';
        input.value = originalText;

        // span を input に置換
        span.style.display = 'none';
        li.insertBefore(input, span.nextSibling);
        input.focus();
        input.select();

        function finishEdit() {
          const newText = input.value.trim();
          if (newText === '') {
            // 空文字で確定 → 削除
            deleteTodo(id);
          } else if (newText !== originalText) {
            // 変更があれば更新
            todos = todos.map(function(todo) {
              if (todo.id === id) {
                return { ...todo, text: newText };
              }
              return todo;
            });
            saveTodos();
          }
          render();
        }

        function cancelEdit() {
          render();
        }

        input.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            input.blur(); // blurでfinishEditが呼ばれる
          } else if (e.key === 'Escape') {
            e.preventDefault();
            cancelEdit();
          }
        });

        input.addEventListener('blur', function() {
          finishEdit();
        });
      }

      // ドラッグ＆ドロップ ハンドラ
      function handleDragStart(e) {
        const li = e.target.closest('.todo-item');
        draggedId = parseInt(li.dataset.id, 10);
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', draggedId);
        // 遅延でクラス付与（dragstartの直後だと反映されないため）
        requestAnimationFrame(function() {
          li.classList.add('dragging');
        });
      }

      function handleDragOver(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';

        const li = e.currentTarget;
        // 自分自身は除外
        if (parseInt(li.dataset.id, 10) === draggedId) return;

        // 挿入位置を判定（上半分か下半分か）
        const rect = li.getBoundingClientRect();
        const midY = rect.top + rect.height / 2;

        // 他のガイドラインをクリア
        document.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(function(el) {
          el.classList.remove('drag-over-top', 'drag-over-bottom');
        });

        if (e.clientY < midY) {
          li.classList.add('drag-over-top');
        } else {
          li.classList.add('drag-over-bottom');
        }
      }

      function handleDragLeave(e) {
        const li = e.currentTarget;
        li.classList.remove('drag-over-top', 'drag-over-bottom');
      }

      function handleDrop(e) {
        e.preventDefault();
        const li = e.currentTarget;
        li.classList.remove('drag-over-top', 'drag-over-bottom');

        const targetId = parseInt(li.dataset.id, 10);
        if (draggedId === null || draggedId === targetId) return;

        // 挿入位置を判定
        const rect = li.getBoundingClientRect();
        const midY = rect.top + rect.height / 2;
        const insertBefore = e.clientY < midY;

        // 配列上のインデックスを取得
        const draggedIndex = todos.findIndex(function(t) { return t.id === draggedId; });
        const targetIndex = todos.findIndex(function(t) { return t.id === targetId; });

        if (draggedIndex === -1 || targetIndex === -1) return;

        // 配列から一旦取り除く
        var movedItem = todos.splice(draggedIndex, 1)[0];

        // 新しいインデックスを再計算（spliceでずれるため）
        var newTargetIndex = todos.findIndex(function(t) { return t.id === targetId; });
        var insertIndex = insertBefore ? newTargetIndex : newTargetIndex + 1;

        // 挿入
        todos.splice(insertIndex, 0, movedItem);

        draggedId = null;
        saveTodos();
        render();
      }

      // ドラッグ終了時のクリーンアップ
      document.addEventListener('dragend', function() {
        document.querySelectorAll('.dragging').forEach(function(el) {
          el.classList.remove('dragging');
        });
        document.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(function(el) {
          el.classList.remove('drag-over-top', 'drag-over-bottom');
        });
        draggedId = null;
      });

      // 全選択チェックボックスのイベント
      selectAllCheckbox.addEventListener('change', function() {
        var checked = selectAllCheckbox.checked;
        todos = todos.map(function(todo) {
          return { ...todo, completed: checked };
        });
        saveTodos();
        render();
      });

      // 完了クリアボタンのイベント
      clearCompletedBtn.addEventListener('click', function() {
        todos = todos.filter(function(todo) { return !todo.completed; });
        saveTodos();
        render();
      });

      // Event listeners
      addBtn.addEventListener('click', addTodo);

      todoInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          addTodo();
        }
      });

      filterButtons.forEach(function(btn) {
        btn.addEventListener('click', function() {
          filterButtons.forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          currentFilter = btn.dataset.filter;
          render();
        });
      });

      // Initialize
      loadTodos();
      render();
    })();
  </script>
</body>
</html>
