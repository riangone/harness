<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 520px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-area {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.2s;
      outline: none;
    }

    .input-area input:focus {
      border-color: #667eea;
    }

    .input-area button {
      padding: 12px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .input-area button:hover {
      opacity: 0.9;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      flex: 1;
      padding: 8px;
      border: 2px solid #e0e0e0;
      background: #fff;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      color: #555;
    }

    .filters button.active {
      border-color: #667eea;
      background: #667eea;
      color: #fff;
    }

    .filters button:hover:not(.active) {
      border-color: #667eea;
      color: #667eea;
    }

    .todo-list {
      list-style: none;
      margin-bottom: 16px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid #f0f0f0;
      gap: 12px;
      transition: background-color 0.2s;
    }

    .todo-item:hover {
      background-color: #f9f9f9;
    }

    .todo-item:last-child {
      border-bottom: none;
    }

    .todo-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #667eea;
    }

    .todo-item .todo-text {
      flex: 1;
      font-size: 16px;
      color: #333;
      word-break: break-word;
    }

    .todo-item .todo-text.completed {
      text-decoration: line-through;
      color: #aaa;
    }

    .todo-item .delete-btn {
      padding: 6px 12px;
      background: #ff4757;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background-color 0.2s;
      opacity: 0.7;
    }

    .todo-item .delete-btn:hover {
      background-color: #ff3344;
      opacity: 1;
    }

    .empty-message {
      text-align: center;
      color: #999;
      padding: 24px;
      font-size: 14px;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid #f0f0f0;
      font-size: 14px;
      color: #666;
    }

    .footer .count {
      font-weight: 600;
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Todo App</h1>

    <div class="input-area">
      <input type="text" id="todo-input" placeholder="新しいTodoを入力..." autofocus>
      <button id="add-btn">追加</button>
    </div>

    <div class="filters">
      <button data-filter="all" class="active">全て</button>
      <button data-filter="active">未完了</button>
      <button data-filter="completed">完了済み</button>
    </div>

    <ul id="todo-list" class="todo-list"></ul>

    <div class="footer">
      <span>未完了: <span class="count" id="pending-count">0</span> 件</span>
    </div>
  </div>

  <script>
    (function() {
      const STORAGE_KEY = 'todo-app-todos';
      let todos = [];
      let currentFilter = 'all';

      // DOM elements
      const todoInput = document.getElementById('todo-input');
      const addBtn = document.getElementById('add-btn');
      const todoList = document.getElementById('todo-list');
      const pendingCount = document.getElementById('pending-count');
      const filterButtons = document.querySelectorAll('.filters button');

      // Load todos from LocalStorage
      function loadTodos() {
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          if (stored) {
            todos = JSON.parse(stored);
          }
        } catch (e) {
          todos = [];
        }
      }

      // Save todos to LocalStorage
      function saveTodos() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
        } catch (e) {
          // Storage full or disabled
        }
      }

      // Render the todo list
      function render() {
        const filteredTodos = todos.filter(function(todo) {
          if (currentFilter === 'active') return !todo.completed;
          if (currentFilter === 'completed') return todo.completed;
          return true;
        });

        todoList.innerHTML = '';

        if (filteredTodos.length === 0) {
          const emptyMsg = document.createElement('div');
          emptyMsg.className = 'empty-message';
          if (currentFilter === 'all') {
            emptyMsg.textContent = 'Todoがありません。追加してください！';
          } else if (currentFilter === 'active') {
            emptyMsg.textContent = '未完了のTodoはありません！';
          } else {
            emptyMsg.textContent = '完了済みのTodoはありません！';
          }
          todoList.appendChild(emptyMsg);
        } else {
          filteredTodos.forEach(function(todo) {
            const li = document.createElement('li');
            li.className = 'todo-item';

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.checked = todo.completed;
            checkbox.addEventListener('change', function() {
              toggleTodo(todo.id);
            });

            const span = document.createElement('span');
            span.className = 'todo-text' + (todo.completed ? ' completed' : '');
            span.textContent = todo.text;

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn';
            deleteBtn.textContent = '削除';
            deleteBtn.addEventListener('click', function() {
              deleteTodo(todo.id);
            });

            li.appendChild(checkbox);
            li.appendChild(span);
            li.appendChild(deleteBtn);
            todoList.appendChild(li);
          });
        }

        // Update pending count
        const pending = todos.filter(function(todo) { return !todo.completed; }).length;
        pendingCount.textContent = pending;
      }

      // Add a new todo
      function addTodo() {
        const text = todoInput.value.trim();
        if (!text) return;

        todos.push({
          id: Date.now(),
          text: text,
          completed: false
        });

        todoInput.value = '';
        saveTodos();
        render();
        todoInput.focus();
      }

      // Toggle todo completion
      function toggleTodo(id) {
        todos = todos.map(function(todo) {
          if (todo.id === id) {
            return { ...todo, completed: !todo.completed };
          }
          return todo;
        });
        saveTodos();
        render();
      }

      // Delete a todo
      function deleteTodo(id) {
        todos = todos.filter(function(todo) { return todo.id !== id; });
        saveTodos();
        render();
      }

      // Event listeners
      addBtn.addEventListener('click', addTodo);

      todoInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          addTodo();
        }
      });

      filterButtons.forEach(function(btn) {
        btn.addEventListener('click', function() {
          filterButtons.forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          currentFilter = btn.dataset.filter;
          render();
        });
      });

      // Initialize
      loadTodos();
      render();
    })();
  </script>
</body>
</html>
