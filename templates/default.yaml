# 汎用フォールバック Pipeline テンプレート
# どんな自然言語の指示にも対応する汎用パイプライン
# コマンドプレフィックス不要、自然言語で直接指示可能

name: default_pipeline
version: 1
description: 汎用フォールバックパイプライン（自然言語対応）

trigger:
  task_type:
    - default
    - general
  auto_apply: true

steps:
  # Step 1: タスク分析・計画
  - id: planning
    agent:
      role: planner
      model_selector:
        strategy: quality
    action: plan
    output_file: plan.md
    prompt_hint: |
      ユーザーの指示を分析し、最適な実行計画を plan.md に出力してください。
      指示の意図を正確に把握し、成果物と手順を明確にすること。

  # Step 2: タスク実行
  - id: generating
    agent:
      role: generator
      model_selector:
        strategy: balanced
    action: generate
    output_file: output.md
    prompt_hint: |
      計画に従ってタスクを実行し、成果物を output.md に出力してください。
      テキスト・コード・データなど形式は問いません。

  # Step 3: 品質確認
  - id: evaluating
    agent:
      role: evaluator
      model_selector:
        strategy: quality
    action: evaluate
    output_file: eval-report.md
    verdict_required: true

on_success:
  - action: collect_file
    file: output.md
  - action: log
    message: "タスクが完了しました"

on_failure:
  - action: log
    message: "タスクが失敗しました。ログを確認してください"
